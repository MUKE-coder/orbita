root = "."
tmp_dir = "tmp"

[build]
  bin = "./tmp/orbita.exe"
  cmd = "go build -o ./tmp/orbita.exe ./cmd/server/"
  delay = 1000
  exclude_dir = ["web", "tmp", "vendor", "node_modules", "migrations"]
  exclude_regex = ["_test\\.go"]
  include_ext = ["go", "tpl", "tmpl", "html"]
  kill_delay = "0s"
  log = "build-errors.log"
  send_interrupt = false
  stop_on_error = true

[log]
  time = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[misc]
  clean_on_exit = true
